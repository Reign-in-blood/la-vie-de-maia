# Déploiement automatique de La vie de Maia sur GitHub Pages

name: Deploy La vie de Maia

on:
  push:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler l’application
        run: npm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer les fichiers du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
